server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: client-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/clients/**

        - id: compte-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/comptes/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/bankcore	  		  
#API Gateway = Réceptionniste d'un hôtel
#→ Reçoit les clients
#→ Les dirige vers la bonne chambre
#Eureka = Tableau d'affichage de l'hôtel
#→ Montre quelles chambres sont disponibles
#→ Indique leur numéro